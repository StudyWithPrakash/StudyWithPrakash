<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study With Prakash</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f7fa;
}

header{
    background:#1565c0;
    color:white;
    text-align:center;
    padding:25px;
}

h1{
    margin:0;
}

.search{
    text-align:center;
    margin:20px;
}

.search input{
    width:90%;
    max-width:500px;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    text-align:center;
    padding:30px 10px;
    text-decoration:none;
    color:#1565c0;
    font-weight:bold;
    box-shadow:0 5px 10px rgba(0,0,0,.15);
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<header>
<h1>Study With Prakash</h1>
<p>Learn Easily. Learn Smart.</p>
</header>

<div class="search">
<input type="text" placeholder="Search lessons...">
</div>

<div class="container">

<a class="card" href="#">Class 1</a>
<a class="card" href="#">Class 2</a>
<a class="card" href="#">Class 3</a>
<a class="card" href="#">Class 4</a>
<a class="card" href="#">Class 5</a>
<a class="card" href="#">Class 6</a>
<a class="card" href="#">Class 7</a>
<a class="card" href="#">Class 8</a>
<a class="card" href="#">Class 9</a>
<a class="card" href="#">Class 10</a>
<a class="card" href="#">Class 11</a>
<a class="card" href="#">Class 12</a>

</div>

</body>
</html>
